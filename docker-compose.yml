version: "3.9"

services:
  # ── FastAPI Backend ────────────────────────────────────────
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: sales-ai-fastapi
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2 --log-level info
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_ENV=production
    volumes:
      - ./app:/app/app:ro      # hot-reload friendly in dev; remove `:ro` for prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - sales-ai-net

  # ── Streamlit Frontend ─────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: sales-ai-streamlit
    restart: unless-stopped
    command: streamlit run streamlit_app/app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - FASTAPI_BASE_URL=http://fastapi:8000
    depends_on:
      fastapi:
        condition: service_healthy
    networks:
      - sales-ai-net

  # ── n8n Workflow Automation ────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: sales-ai-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Kolkata
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/workflows:ro   # import workflow JSON from here
    networks:
      - sales-ai-net

volumes:
  n8n_data:

networks:
  sales-ai-net:
    driver: bridge
